{% load static %}
<nav class="navbar navbar-expand-lg navbar-dark quizhub-navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'quizhub:home' %}">QuizHub</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'quizhub:home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'quiz_list' %}active{% endif %}" href="{% url 'quizhub:quizzes:quiz_list' %}">Quizzes</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Admin
                    </a>
                    <ul class="dropdown-menu" aria-labelledby="adminDropdown">
                        <li>
                            <a class="dropdown-item" href="{% url 'quizhub:quizzes:categories_admin' %}">Manage Categories</a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="{% url 'quizhub:quizzes:quiz_admin' %}">Manage Quizzes</a>
                        </li>
                    </ul>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                {% if user.is_authenticated %}
                    <span class="text-muted small mb-0">Hi {{ user.username }}</span>
                    <form method="post" action="{% url 'userauth:logout' %}" class="m-0">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-quiz btn-sm">Logout</button>
                    </form>
                {% else %}
                    <a class="btn btn-quiz btn-sm" href="{% url 'userauth:login' %}">Login</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
